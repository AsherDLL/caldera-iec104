---

- id: 81af713d-618a-4b31-a133-95c587ce089c
  name: IEC 104 - Station Interrogation
  description: |
    IEC 60870-5-104 general (station) interrogation (C_IC_NA_1). Requests the
    current value of every information object the outstation exposes, enumerating
    its points and their states.
  tactic: collection
  technique_id: T0861
  technique_name: Point & Tag Identification
  executors:
  - platform: linux
    name: sh
    command: >
      ./iec104_cli #{iec104.server.ip} --port #{iec104.server.port} --ca #{iec104.common_address} interrogate
    payloads:
    - iec104_cli
  - platform: windows
    name: psh
    command: >
      .\iec104_cli.exe #{iec104.server.ip} --port #{iec104.server.port} --ca #{iec104.common_address} interrogate
    payloads:
    - iec104_cli.exe
  - platform: darwin
    name: sh
    command: >
      ./iec104_cli_darwin #{iec104.server.ip} --port #{iec104.server.port} --ca #{iec104.common_address} interrogate
    payloads:
    - iec104_cli_darwin
