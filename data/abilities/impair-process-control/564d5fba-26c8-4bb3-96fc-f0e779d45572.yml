---

- id: 564d5fba-26c8-4bb3-96fc-f0e779d45572
  name: IEC 104 - Set Point Command
  description: |
    Send an IEC 60870-5-104 set-point command (C_SE_NC_1, short floating point) to
    an analog control point. Altering a set-point changes a process target value
    (flow, pressure, speed, level), modifying how the process is controlled.
  tactic: impair-process-control
  technique_id: T0836
  technique_name: Modify Parameter
  executors:
  - platform: linux
    name: sh
    command: >
      ./iec104_cli #{iec104.server.ip} --port #{iec104.server.port} --ca #{iec104.common_address} setpoint #{iec104.setpoint.ioa} #{iec104.setpoint.value}
    payloads:
    - iec104_cli
  - platform: windows
    name: psh
    command: >
      .\iec104_cli.exe #{iec104.server.ip} --port #{iec104.server.port} --ca #{iec104.common_address} setpoint #{iec104.setpoint.ioa} #{iec104.setpoint.value}
    payloads:
    - iec104_cli.exe
  - platform: darwin
    name: sh
    command: >
      ./iec104_cli_darwin #{iec104.server.ip} --port #{iec104.server.port} --ca #{iec104.common_address} setpoint #{iec104.setpoint.ioa} #{iec104.setpoint.value}
    payloads:
    - iec104_cli_darwin
